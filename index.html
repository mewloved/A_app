<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<!-- Firebase compat SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<title>MEW DIARY</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #ffffff;
  --navy:    #0d1b2e;
  --navy2:   #1a2d45;
  --accent:  #c8102e;
  --surface: #f4f7fb;
  --surface2:#eaf0f8;
  --border:  #dde3ed;
  --muted:   #7a8b9e;
  --gold:    #9a7b4f;
  --nav-h:   68px;
}

[data-theme="dark"] {
  --bg:      #0d1117;
  --navy:    #e8edf4;
  --navy2:   #c8d0dc;
  --surface: #161b22;
  --surface2:#1c2330;
  --border:  #2d3748;
  --muted:   #6b7a8f;
  --gold:    #b8976a;
}

body {
  font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
  background: var(--bg);
  color: var(--navy);
  min-height: 100vh;
  -webkit-text-size-adjust: 100%;
}

.app {
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  padding-bottom: calc(var(--nav-h) + 12px);
}

/* ── HEADER ── */
.header {
  padding: 20px 22px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 100;
}

.logo {
  display: flex;
  align-items: baseline;
  gap: 1px;
}

.logo-mark {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--accent);
  margin-right: 8px;
  flex-shrink: 0;
  align-self: center;
}

.logo-text {
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 0.18em;
  color: var(--navy);
  text-transform: uppercase;
}

.logo-sub {
  font-size: 13px;
  font-weight: 300;
  letter-spacing: 0.12em;
  color: var(--muted);
  text-transform: lowercase;
  margin-left: 5px;
}

.today-label {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.07em;
  font-weight: 500;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 10px;
}

.sync-badge {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--border);
  transition: background .4s;
  flex-shrink: 0;
}
.sync-badge.syncing {
  background: #f39c12;
  animation: syncPulse 1.2s ease-in-out infinite;
}
.sync-badge.synced  { background: #27ae60; }
.sync-badge.error   { background: var(--accent); }
@keyframes syncPulse {
  0%,100% { opacity:1; } 50% { opacity:.35; }
}

/* ── MEW DIARY LOGIN ── */
.login-overlay {
  position: fixed;
  inset: 0;
  background: #080a12;
  z-index: 900;
  font-family: 'DM Sans', sans-serif;
  overflow: hidden;
}
.login-overlay.hidden { display: none; }

.login-overlay .login-bg {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 50% -10%, rgba(70,50,140,0.5) 0%, transparent 65%),
    radial-gradient(ellipse 60% 40% at 80% 80%, rgba(30,20,80,0.6) 0%, transparent 60%),
    linear-gradient(180deg, #080a12 0%, #0d0f1e 100%);
}

.login-overlay .login-stars {
  position: absolute; inset: 0;
  background-image:
    radial-gradient(1px 1px at 12% 8%,  rgba(255,255,255,0.7) 0%, transparent 100%),
    radial-gradient(1px 1px at 78% 5%,  rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 55% 12%, rgba(200,180,255,0.8) 0%, transparent 100%),
    radial-gradient(1px 1px at 30% 18%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 88% 22%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 6%  35%, rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 92% 40%, rgba(220,200,255,0.6) 0%, transparent 100%),
    radial-gradient(1px 1px at 20% 60%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 65% 70%, rgba(255,255,255,0.4) 0%, transparent 100%);
}

.login-overlay .login-orb {
  position: absolute; border-radius: 50%;
  filter: blur(50px); pointer-events: none;
  animation: login-orb-float 7s ease-in-out infinite;
}
.login-overlay .login-orb1 { width:200px; height:200px; background:rgba(90,60,200,0.2);  top:-60px; left:-60px; animation-delay:0s; }
.login-overlay .login-orb2 { width:150px; height:150px; background:rgba(160,90,255,0.15); top:60px;  right:-40px; animation-delay:-3s; }
.login-overlay .login-orb3 { width:120px; height:120px; background:rgba(50,100,220,0.18); bottom:25%; left:10px;  animation-delay:-5s; }

@keyframes login-orb-float {
  0%,100% { transform: translate(0,0); }
  50%      { transform: translate(15px,-25px); }
}

.login-overlay .login-screen {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center;
}

.login-overlay .login-top {
  width: 100%; text-align: center;
  padding: 72px 32px 0;
}

.login-overlay .login-eyebrow {
  font-family: 'Space Mono', monospace;
  font-size: 9px; color: rgba(160,130,255,0.5);
  letter-spacing: 5px; text-transform: uppercase;
  margin-bottom: 10px;
}

.login-overlay .login-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 52px; font-weight: 300;
  color: #f0eaff; letter-spacing: 6px; line-height: 1;
  margin-bottom: 8px;
}
.login-overlay .login-title em { font-style: italic; color: rgba(180,150,255,0.9); }

.login-overlay .login-tagline {
  font-size: 12px; font-weight: 300;
  color: rgba(160,140,220,0.45); letter-spacing: 2px;
}

.login-overlay .login-cat-wrap {
  flex: 1;
  position: relative;
  width: 100%;
  display: flex; align-items: flex-end; justify-content: center;
  padding-bottom: 140px;
}

.login-overlay .login-cat-glow {
  position: absolute;
  bottom: 134px; left: 50%; transform: translateX(-50%);
  width: 180px; height: 22px;
  background: radial-gradient(ellipse, rgba(140,100,255,0.45) 0%, transparent 70%);
  filter: blur(8px);
  animation: login-breathe 4s ease-in-out infinite;
}

.login-overlay .login-cat-img {
  width: 240px; max-height: 320px;
  object-fit: contain; object-position: bottom center;
  filter: drop-shadow(0 0 28px rgba(160,120,255,0.45))
          drop-shadow(0 24px 40px rgba(0,0,0,0.85));
  animation: login-breathe 4s ease-in-out infinite;
}

@keyframes login-breathe {
  0%,100% { transform: translateY(0px); }
  50%      { transform: translateY(-8px); }
}

.login-overlay .login-wave {
  position: absolute;
  bottom: 100px; left: 50%; transform: translateX(-50%);
  display: flex; align-items: center; gap: 3px;
}
.login-overlay .login-bar {
  width: 2.5px; border-radius: 2px;
  background: linear-gradient(to top, rgba(100,70,200,0.4), rgba(180,140,255,0.75));
  animation: login-wv 1.5s ease-in-out infinite;
}
.login-overlay .login-bar:nth-child(1){height:5px;  animation-delay:0s}
.login-overlay .login-bar:nth-child(2){height:13px; animation-delay:.1s}
.login-overlay .login-bar:nth-child(3){height:22px; animation-delay:.2s}
.login-overlay .login-bar:nth-child(4){height:30px; animation-delay:.3s}
.login-overlay .login-bar:nth-child(5){height:20px; animation-delay:.4s}
.login-overlay .login-bar:nth-child(6){height:26px; animation-delay:.5s}
.login-overlay .login-bar:nth-child(7){height:15px; animation-delay:.6s}
.login-overlay .login-bar:nth-child(8){height:9px;  animation-delay:.7s}
.login-overlay .login-bar:nth-child(9){height:4px;  animation-delay:.8s}

@keyframes login-wv {
  0%,100% { transform: scaleY(1);    opacity: .8; }
  50%      { transform: scaleY(.25); opacity: .3; }
}

.login-overlay .login-bottom {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 0 28px 52px;
}

.btn-google {
  width: 100%; padding: 17px;
  border-radius: 18px; border: none;
  background: linear-gradient(135deg, rgba(90,60,200,0.95), rgba(160,100,255,0.95));
  color: white;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px; font-weight: 500; letter-spacing: 0.4px;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  cursor: pointer;
  box-shadow: 0 8px 32px rgba(120,80,255,0.45), inset 0 1px 0 rgba(255,255,255,0.15);
  margin-bottom: 14px;
  -webkit-tap-highlight-color: transparent;
  transition: opacity .15s, transform .1s;
}
.btn-google:active { opacity:.85; transform: scale(.98); }
.btn-google .g-logo { width: 18px; height: 18px; flex-shrink: 0; }

.login-overlay .login-hint {
  font-size: 11px; color: rgba(160,140,220,0.38);
  text-align: center; line-height: 1.7;
}

/* ── USER AVATAR ── */
.user-btn {
  background: none;
  border: none;
  padding: 0;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 7px;
}
.user-avatar {
  width: 28px; height: 28px;
  border-radius: 50%;
  object-fit: cover;
  border: 1.5px solid var(--border);
}
.user-avatar-fallback {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--navy);
  color: #fff;
  font-size: 12px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  letter-spacing: 0;
}

/* ── PANELS ── */
.panel { display: none; padding: 22px; }
.panel.active { display: block; }

/* ── RECORDER ── */
.recorder-panel { text-align: center; }

.rec-date {
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 4px;
  font-weight: 500;
}

.rec-location {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 12px;
  font-weight: 600;
  color: var(--navy);
  margin-bottom: 6px;
  min-height: 18px;
  letter-spacing: 0.02em;
}
.rec-location:empty { display: none; }
.rec-location.loading { color: var(--muted); font-weight: 400; }

/* 목록 타임라인 위치 배지 */
.tl-location {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  font-weight: 600;
  color: var(--navy);
  margin-bottom: 4px;
  letter-spacing: 0.02em;
}

/* 캘린더 day entry 위치 */
.day-entry-location {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  margin-top: 3px;
}

.mic-wrap {
  margin: 28px auto 8px;
  width: 110px;
  height: 110px;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

.mic-btn {
  width: 96px;
  height: 96px;
  border-radius: 50%;
  border: none;
  background: var(--navy);
  color: #fff;
  cursor: pointer;
  transition: background .2s, transform .12s, box-shadow .2s;
  position: relative;
  z-index: 1;
  -webkit-tap-highlight-color: transparent;
  box-shadow: 0 6px 24px rgba(13,27,46,.22);
  display: flex;
  align-items: center;
  justify-content: center;
}

.mic-btn svg { pointer-events: none; }

.mic-btn:active { transform: scale(.94); }

.mic-btn.recording {
  background: var(--accent);
  box-shadow: 0 6px 28px rgba(200,16,46,.30);
}

.mic-btn.recording::before,
.mic-btn.recording::after {
  content: '';
  position: absolute;
  inset: -10px;
  border-radius: 50%;
  border: 1.5px solid var(--accent);
  animation: ripple 1.5s ease-out infinite;
  opacity: 0;
}

.mic-btn.recording::after { animation-delay: .75s; }

@keyframes ripple {
  0%  { transform: scale(1); opacity: .5; }
  100%{ transform: scale(1.55); opacity: 0; }
}

.rec-status {
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 20px;
  min-height: 14px;
  letter-spacing: 0.06em;
  font-weight: 500;
  text-transform: uppercase;
}

.rec-status.on { color: var(--accent); }

.transcript-box {
  background: var(--surface);
  border-radius: 18px;
  padding: 18px;
  min-height: 110px;
  max-height: 190px;
  overflow-y: auto;
  text-align: left;
  font-size: 15px;
  line-height: 1.7;
  white-space: pre-wrap;
  word-break: break-all;
  color: var(--navy);
  margin-bottom: 16px;
  border: 1.5px solid var(--border);
  cursor: text;
  outline: none;
  transition: border-color .2s, box-shadow .2s;
}

.transcript-box:focus {
  border-color: var(--navy);
  box-shadow: 0 0 0 3px rgba(13,27,46,.06);
}

.transcript-box.empty::after {
  content: attr(data-placeholder);
  color: var(--muted);
  font-size: 14px;
  pointer-events: none;
}

.action-row {
  display: flex;
  gap: 10px;
  justify-content: center;
}

.btn {
  padding: 13px 28px;
  border: none;
  border-radius: 50px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity .18s, transform .1s, box-shadow .18s;
  -webkit-tap-highlight-color: transparent;
  letter-spacing: 0.03em;
}

.btn:active { transform: scale(.96); }
.btn:disabled { opacity: .35; pointer-events: none; }

.btn-save {
  background: var(--navy);
  color: #fff;
  box-shadow: 0 4px 16px rgba(13,27,46,.18);
}

.btn-save:hover { box-shadow: 0 6px 20px rgba(13,27,46,.26); }

.btn-clear {
  background: var(--surface);
  color: var(--muted);
  border: 1.5px solid var(--border);
}

/* ── CALENDAR ── */
.cal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 18px;
}

.cal-title {
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 0.01em;
  color: var(--navy);
}

.cal-nav {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  width: 34px;
  height: 34px;
  font-size: 16px;
  color: var(--navy);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-tap-highlight-color: transparent;
  transition: background .15s;
}

.cal-nav:hover { background: var(--surface2); }

.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
}

.cal-dow {
  text-align: center;
  font-size: 10px;
  font-weight: 700;
  color: var(--muted);
  padding: 4px 0 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.cal-dow:first-child { color: #c0392b; }
.cal-dow:last-child  { color: #2980b9; }

.cal-cell {
  aspect-ratio: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border-radius: 12px;
  font-size: 13px;
  cursor: pointer;
  position: relative;
  transition: background .15s;
  -webkit-tap-highlight-color: transparent;
  gap: 3px;
  font-weight: 500;
}

.cal-cell:hover { background: var(--surface); }
.cal-cell.empty { pointer-events: none; }

.cal-cell.today {
  font-weight: 800;
  background: var(--surface2);
  border: 1.5px solid var(--border);
}

.cal-cell.selected {
  background: var(--navy) !important;
  color: #fff;
}

.cal-cell.has-entry .dot {
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--accent);
}

.cal-cell.selected .dot { background: rgba(255,255,255,.65); }

/* ── 뷰 토글 (월간/주간) ── */
.cal-view-toggle {
  display: flex;
  gap: 4px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 50px;
  padding: 3px;
}
.cal-view-btn {
  border: none;
  background: none;
  border-radius: 50px;
  padding: 5px 14px;
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
  cursor: pointer;
  letter-spacing: 0.04em;
  transition: background .15s, color .15s;
}
.cal-view-btn.active {
  background: var(--navy);
  color: #fff;
}

/* ── 사진 있는 셀 (Day One 스타일) ── */
.cal-cell.has-photo {
  background-size: cover;
  background-position: center;
  overflow: hidden;
  border-radius: 5px;   /* 더 각지게 */
}
.cal-cell.has-photo::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(to top,
    rgba(0,0,0,.60) 0%,
    rgba(0,0,0,.15) 45%,
    rgba(0,0,0,.0)  100%);
}
/* 숫자를 좌하단으로 */
.cal-cell.has-photo span {
  position: absolute;
  bottom: 5px;
  left: 0; right: 0;
  text-align: center;
  z-index: 1;
  color: #fff;
  text-shadow: 0 1px 4px rgba(0,0,0,.7);
  font-weight: 800;
  font-size: 14px;
}
.cal-cell.has-photo .dot { display: none; } /* 사진 있으면 dot 숨김 */
.cal-cell.has-photo.today { box-shadow: inset 0 0 0 2.5px var(--accent); }
.cal-cell.has-photo.selected {
  box-shadow: inset 0 0 0 2.5px var(--accent);
}
.cal-cell.has-photo.selected span { color: #fff; }

/* ── 주간 뷰 그리드 ── */
.cal-week-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
  margin-top: 8px;
}
.cal-week-cell {
  aspect-ratio: 2/3;
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  padding-bottom: 7px;
  cursor: pointer;
  position: relative;
  background: var(--surface);
  transition: background .15s;
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
}
.cal-week-cell.has-photo {
  background-size: cover;
  background-position: center;
  border-radius: 10px;
}
.cal-week-cell.has-photo::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(to top,
    rgba(0,0,0,.65) 0%,
    rgba(0,0,0,.10) 50%,
    rgba(0,0,0,.0)  100%);
}
.cal-week-dow {
  position: absolute;
  top: 7px;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--muted);
  z-index: 1;
}
.cal-week-cell.has-photo .cal-week-dow { color: rgba(255,255,255,.75); }
.cal-week-date {
  font-size: 18px;
  font-weight: 800;
  color: var(--navy);
  position: relative;
  z-index: 1;
}
.cal-week-cell.has-photo .cal-week-date {
  color: #fff;
  text-shadow: 0 1px 5px rgba(0,0,0,.7);
}
.cal-week-cell.today { background: var(--surface2); border: 1.5px solid var(--border); }
.cal-week-cell.selected { box-shadow: inset 0 0 0 2.5px var(--accent); }
.cal-week-cell.selected .cal-week-date { color: var(--accent); }
.cal-week-cell.has-photo.selected .cal-week-date { color: #fff; }
.cal-week-cell.sun .cal-week-date { color: #c0392b; }
.cal-week-cell.sat .cal-week-date { color: #2980b9; }
.cal-week-cell.has-photo.sun .cal-week-date,
.cal-week-cell.has-photo.sat .cal-week-date { color: #fff; }
.cal-week-dot {
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--accent);
  position: absolute;
  bottom: 3px;
  z-index: 1;
}
.cal-week-cell.has-photo .cal-week-dot { background: rgba(255,255,255,.85); }

.cal-cell.sun { color: #c0392b; }
.cal-cell.sat { color: #2980b9; }
.cal-cell.selected.sun,
.cal-cell.selected.sat { color: #fff; }
.cal-cell.other-month { opacity: .3; }

/* ── DAY ENTRIES ── */
.day-entries { margin-top: 22px; }

.day-entries-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.day-entries-actions {
  display: flex;
  gap: 6px;
}

.day-action-btn {

.btn-edit {

}

.btn-edit:hover { color: var(--navy); border-color: var(--navy); }

.btn-del {
  font-size: 12px;
  padding: 6px 14px;

  border: 1.5px solid var(--border);

.btn-edit-cancel {

/* ── AI FEATURES ── */
.ai-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
}

.btn-ai {
  flex: 1;
  padding: 10px 8px;

  background: var(--surface);

  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.03em;
  transition: background .15s, border-color .15s, transform .1s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  -webkit-tap-highlight-color: transparent;
}

.btn-ai:active { transform: scale(.96); }

.btn-ai.primary {
  background: var(--navy);

}

.btn-ai svg { flex-shrink: 0; }

.ai-spin {

  height: 13px;

  border-radius: 50%;

}

@keyframes spin { to { transform: rotate(360deg); } }

/* AI Result Sheet */
.ai-sheet-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.45);
  z-index: 600;

  pointer-events: none;
  transition: opacity .25s;
}
.ai-sheet-backdrop.open { opacity: 1; pointer-events: auto; }

.ai-sheet {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%) translateY(100%);
  width: 100%;
  max-width: 480px;
  background: var(--bg);
  border-radius: 22px 22px 0 0;
  z-index: 601;
  transition: transform .32s cubic-bezier(.4,0,.2,1);
  padding-bottom: calc(var(--nav-h) + 10px);

  flex-direction: column;
}

.ai-sheet-handle {

  margin: 10px auto 0;

}

.ai-sheet-head {
  display: flex;
  align-items: center;

.ai-sheet-title {

.ai-sheet-body {

.ai-result-text {
  font-size: 15px;
  line-height: 1.75;
  color: var(--navy);
  white-space: pre-wrap;
  word-break: break-word;
}

.ai-result-section {
  margin-bottom: 18px;
}

.ai-result-label {
  font-size: 10px;
  font-weight: 700;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 6px;
}

.ai-result-value {
  font-size: 14px;
  line-height: 1.6;
  color: var(--navy);
}

.ai-tags {

}

.ai-tag {

  color: var(--navy);
}

.ai-sheet-actions {
  padding: 12px 20px 0;

  gap: 10px;
  flex-shrink: 0;
  border-top: 1px solid var(--border);
}

.btn-ai-apply {
  flex: 1;
  padding: 12px;
  background: var(--navy);
  color: #fff;
  border: none;
  border-radius: 50px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.02em;
}

.btn-ai-discard {
  padding: 12px 20px;
  background: var(--surface);
  color: var(--muted);
  border: 1.5px solid var(--border);
  border-radius: 50px;

/* AI Settings row */
.ai-settings-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 16px;

  background: var(--surface);

}

.ai-settings-label {
  font-size: 12px;
  color: var(--muted);
  font-weight: 600;
  white-space: nowrap;
  letter-spacing: 0.04em;
}

.ai-model-input {
  flex: 1;
  border: none;
  background: transparent;
  font-size: 13px;
  color: var(--navy);
  font-weight: 600;
  font-family: inherit;
  outline: none;
  min-width: 0;
}

/* ── BOTTOM NAV ── */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  height: var(--nav-h);
  background: var(--bg);
  border-top: 1px solid var(--border);
  display: flex;
  z-index: 200;
  padding-bottom: env(safe-area-inset-bottom, 0px);
}

.nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 5px;
  border: none;
  background: none;
  cursor: pointer;
  color: var(--muted);
  transition: color .2s;
  -webkit-tap-highlight-color: transparent;
  position: relative;
  padding-top: 4px;
}

.nav-btn::before {
  content: '';
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%) scaleX(0);
  width: 28px;
  height: 2px;
  background: var(--accent);
  border-radius: 0 0 3px 3px;
  transition: transform .2s;
}

.nav-btn.active { color: var(--navy); }
.nav-btn.active::before { transform: translateX(-50%) scaleX(1); }

.nav-icon { display: flex; align-items: center; justify-content: center; }
.nav-label { font-size: 10px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; }

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: calc(var(--nav-h) + 16px);
  left: 50%;
  transform: translateX(-50%) translateY(12px);
  background: var(--navy);
  color: #fff;
  padding: 10px 22px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 600;
  opacity: 0;
  transition: all .28s;
  pointer-events: none;
  z-index: 999;
  white-space: nowrap;
  letter-spacing: 0.03em;
  box-shadow: 0 4px 20px rgba(13,27,46,.22);
}
.toast.error {
  white-space: pre-wrap;
  word-break: break-all;
  border-radius: 14px;
  max-width: min(360px, 90vw);
  text-align: left;
  font-weight: 500;
  font-size: 12px;
  line-height: 1.6;
  padding: 12px 18px;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ── SETTINGS TAB ── */
.settings-panel { padding: 22px; }

.settings-section {
  margin-bottom: 28px;
}
.settings-section-title {
  font-size: 10px;
  font-weight: 700;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 12px;
}
.settings-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 14px 16px;
  margin-bottom: 8px;
}
.settings-row-label {
  font-size: 14px;
  font-weight: 600;
  color: var(--navy);
}
.settings-row-sub {
  font-size: 11px;
  color: var(--muted);
  margin-top: 2px;
}

/* toggle switch */
.toggle-wrap { display: flex; align-items: center; gap: 8px; }
.toggle {
  position: relative;
  width: 44px;
  height: 26px;
  flex-shrink: 0;
}
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-slider {
  position: absolute;
  inset: 0;
  background: var(--border);
  border-radius: 50px;
  cursor: pointer;
  transition: background .2s;
}
.toggle-slider::before {
  content: '';
  position: absolute;
  left: 3px;
  top: 3px;
  width: 20px;
  height: 20px;
  background: #fff;
  border-radius: 50%;
  transition: transform .2s;
  box-shadow: 0 1px 4px rgba(0,0,0,.2);
}
.toggle input:checked + .toggle-slider { background: var(--accent); }
.toggle input:checked + .toggle-slider::before { transform: translateX(18px); }

/* export / account buttons */
.btn-settings-action {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 14px 16px;
  font-size: 14px;
  font-weight: 600;
  color: var(--navy);
  cursor: pointer;
  text-align: left;
  margin-bottom: 8px;
  transition: background .15s;
}
.btn-settings-action:active { background: var(--surface2); }
.btn-settings-action.danger { color: var(--accent); }

.settings-ai-input {
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 13px;
  color: var(--navy);

}

  border: 1.5px solid var(--border);

  padding: 8px 16px;

/* Day time-of-day section label */

  font-size: 10px;
  font-weight: 700;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;

  gap: 6px;
}
.day-time-label:first-child { padding-top: 2px; }

/* Inline location edit */
.loc-edit-btn {
  background: none;
  border: none;
  padding: 0 2px;
  color: var(--muted);
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  font-size: 13px;
  line-height: 1;
  opacity: 0.6;
  transition: opacity .15s;
}
.loc-edit-btn:hover { opacity: 1; }
.loc-inline-input {
  border: none;
  border-bottom: 1.5px solid var(--navy);
  background: transparent;
  font-size: 12px;
  font-weight: 600;
  color: var(--navy);
  font-family: inherit;
  outline: none;
  min-width: 80px;
  max-width: 160px;
}

/* lightbox */
.lightbox {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.88);
  z-index: 800;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s;
}
.lightbox.open { opacity: 1; pointer-events: auto; }
.lightbox img {
  max-width: 95vw;
  max-height: 85vh;
  border-radius: 10px;
  object-fit: contain;
}
.lightbox-close {
  position: absolute;
  top: 20px;
  right: 20px;
  background: rgba(255,255,255,.15);
  border: none;
  color: #fff;
  font-size: 22px;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ── SETTINGS REDESIGN ── */
.settings-account-card {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 18px 16px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 18px;
  margin-bottom: 24px;
}
.settings-avatar-img {
  width: 52px; height: 52px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid var(--border);
  flex-shrink: 0;
}
.settings-avatar-fallback {
  width: 52px; height: 52px;
  border-radius: 50%;
  background: var(--navy);
  color: #fff;
  font-size: 20px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  letter-spacing: 0;
}
.settings-account-info { flex: 1; min-width: 0; }
.settings-account-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--navy);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.settings-account-sub {
  font-size: 12px;
  color: var(--muted);
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.settings-sync-time {
  font-size: 11px;
  color: var(--muted);
  margin-top: 4px;
  letter-spacing: 0.01em;
}
.settings-group {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
}
.settings-nav-row {
  display: flex;
  align-items: center;
  gap: 12px;
  width: 100%;
  padding: 13px 16px;
  background: none;
  border: none;
  border-bottom: 1px solid var(--border);
  text-align: left;
  cursor: pointer;
  transition: background .15s;
  -webkit-tap-highlight-color: transparent;
}
.settings-nav-row:last-child { border-bottom: none; }
.settings-nav-row:active { background: var(--surface2); }
.settings-nav-icon {
  width: 30px; height: 30px;
  border-radius: 8px;
  background: var(--navy);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  color: #fff;
}
.settings-nav-label {
  flex: 1;
  font-size: 14px;
  font-weight: 600;
  color: var(--navy);
  letter-spacing: 0.01em;
}
.settings-nav-arrow {
  font-size: 20px;
  color: var(--muted);
  font-weight: 300;
  line-height: 1;
}
.settings-inner-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 24px;
}
.settings-back-btn {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 50%;
  width: 34px; height: 34px;
  font-size: 22px;
  color: var(--navy);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
  flex-shrink: 0;
  padding-bottom: 1px;
  -webkit-tap-highlight-color: transparent;
  transition: background .15s;
}
.settings-back-btn:active { background: var(--surface2); }
.settings-inner-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--navy);
  letter-spacing: 0.01em;
}
.btn-settings-signout {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  padding: 14px;
  margin-top: 4px;
  background: none;
  border: 1.5px solid rgba(200,16,46,.25);
  border-radius: 14px;
  font-size: 14px;
  font-weight: 600;
  color: var(--accent);
  cursor: pointer;
  transition: background .15s;
  -webkit-tap-highlight-color: transparent;
  letter-spacing: 0.02em;
}
.btn-settings-signout:active { background: rgba(200,16,46,.06); }
</style>
</head>

<script>
/* ═══════════════════════════════════════════
   FIREBASE SETUP
═══════════════════════════════════════════ */
const firebaseConfig = {
  apiKey: "__FB_API_KEY__",
  authDomain: "__FB_AUTH_DOMAIN__",
  projectId: "__FB_PROJECT_ID__",
  storageBucket: "__FB_STORAGE_BUCKET__",
  messagingSenderId: "__FB_MESSAGING_SENDER_ID__",
  appId: "__FB_APP_ID__",
  measurementId: "__FB_MEASUREMENT_ID__"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();

let _uid = null;
let _lastSyncTime = null;

function setSyncBadge(state) {
  const el = document.getElementById('syncBadge');
  if (el) { el.className = 'sync-badge ' + state; el.title = { syncing:'동기화 중…', synced:'Firebase 동기화됨', error:'동기화 실패 (오프라인 모드)' }[state] || ''; }
  if (state === 'synced') _lastSyncTime = new Date();
}

function fsEntries() {
  return db.collection('users').doc(_uid).collection('entries');
}

// Firestore → localStorage 전체 덮어쓰기
async function pullFromFirestore() {
  if (!_uid) return;
  setSyncBadge('syncing');
  try {
    const snap = await fsEntries().orderBy('ts', 'desc').get();
    const entries = snap.docs.map(d => d.data());
    saveEntries(entries);
    refreshActiveTab();
    setSyncBadge('synced');
  } catch (e) {
    console.warn('[Firebase] pull failed:', e);
    setSyncBadge('error');
  }
}

// 실시간 동기화 리스너
let _unsubscribe = null;
function startRealtimeSync() {
  if (_unsubscribe) _unsubscribe();
  _unsubscribe = fsEntries()
    .orderBy('ts', 'desc')
    .onSnapshot(snap => {
      const entries = snap.docs.map(d => d.data());
      saveEntries(entries);
      refreshActiveTab();
      setSyncBadge('synced');
    }, () => setSyncBadge('error'));
}

function refreshActiveTab() {
  const tab = document.querySelector('.nav-btn.active')?.dataset.tab;
  if (tab === 'list') renderList();
  if (tab === 'calendar') renderCalendar();
}

/* ── 구글 로그인 ── */
const googleProvider = new firebase.auth.GoogleAuthProvider();
// 매번 계정 선택 화면 표시 (iOS에서 세션 충돌 방지)
googleProvider.setCustomParameters({ prompt: 'select_account' });
// 기기 언어로 UI 표시
auth.useDeviceLanguage();

function signInWithGoogle() {
  // Safari ITP 우회: localStorage 대신 sessionStorage 사용 후 redirect
  auth.setPersistence(firebase.auth.Auth.Persistence.SESSION)
    .then(() => auth.signInWithRedirect(googleProvider))
    .catch(err => {
      console.error('[Auth] signInWithRedirect error');
      console.error('  code   :', err.code);
      console.error('  message:', err.message);
      showToast(`code: ${err.code || 'unknown'}\n${err.message || err}`, { duration: 8000, error: true });
    });
}

// 리다이렉트 후 복귀 시 결과 처리 (onAuthStateChanged가 로그인 상태를 처리)
auth.getRedirectResult()
  .then(result => {
    if (result && result.user) {
      console.log('[Auth] redirect success:', result.user.email);
    }
  })
  .catch(err => {
    console.error('[Auth] getRedirectResult error');
    console.error('  code   :', err.code);
    console.error('  message:', err.message);
    console.error('  full   :', err);
    showToast(`code: ${err.code || 'unknown'}\n${err.message || err}`, { duration: 8000, error: true });
  });

function handleSignOut() {
  if (!confirm('로그아웃할까요?')) return;
  if (_unsubscribe) { _unsubscribe(); _unsubscribe = null; }
  _uid = null;
  auth.signOut();
}

function renderUserBtn(user) {
  const btn = document.getElementById('userBtn');
  if (!btn) return;
  btn.innerHTML = '';
  if (!user) { btn.style.display = 'none'; return; }
  btn.style.display = 'flex';
  if (user.photoURL) {
    const img = document.createElement('img');
    img.className = 'user-avatar';
    img.src = user.photoURL;
    img.alt = user.displayName || '';
    btn.appendChild(img);
  } else {
    const fb = document.createElement('div');
    fb.className = 'user-avatar-fallback';
    fb.textContent = (user.displayName || user.email || '?')[0].toUpperCase();
    btn.appendChild(fb);
  }
}

/* ═══════════════════════════════════════════
   STORAGE  (localStorage + Firestore 이중 저장)
═══════════════════════════════════════════ */
const STORAGE_KEY = 'voiceDiary_entries';

function loadEntries() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}

function saveEntries(entries) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
}

function addEntry(text) {
  const entries = loadEntries();
  const now = new Date();
  const dateStr = toDateStr(now);
  const existing = entries.find(e => e.date === dateStr);
  const loc = _currentLocation?.label || null;

  if (existing) {
    existing.text = existing.text + ' ' + text.trim();
    if (loc && !existing.location) existing.location = loc;
    saveEntries(entries);
    if (_uid) {
      setSyncBadge('syncing');
      const upd = { text: existing.text };
      if (loc && !existing.location) upd.location = loc;
      fsEntries().doc(String(existing.id)).update(upd)
        .then(() => setSyncBadge('synced'))
        .catch(() => setSyncBadge('error'));
    }
  } else {
    const id = Date.now();
    const entry = { id, text: text.trim(), date: dateStr, ts: now.toISOString() };
    if (loc) entry.location = loc;
    entries.unshift(entry);
    saveEntries(entries);
    if (_uid) {
      setSyncBadge('syncing');
      fsEntries().doc(String(id)).set(entry)
        .then(() => setSyncBadge('synced'))
        .catch(() => setSyncBadge('error'));
    }
  }
}

// 특정 날짜에 수기로 항목 추가 (오늘이 아닌 날도 가능)
function addEntryForDate(text, dateStr) {
  const entries = loadEntries();
  const existing = entries.find(e => e.date === dateStr);
  // 날짜의 정오 시각으로 ts 설정 (과거 날짜여도 자연스럽게)
  const [y, m, d] = dateStr.split('-');
  const ts = new Date(+y, +m - 1, +d, 12, 0, 0).toISOString();

  if (existing) {
    existing.text = existing.text + ' ' + text.trim();
    saveEntries(entries);
    if (_uid) {
      setSyncBadge('syncing');
      fsEntries().doc(String(existing.id)).update({ text: existing.text })
        .then(() => setSyncBadge('synced'))
        .catch(() => setSyncBadge('error'));
    }
  } else {
    const id = Date.now();
    const entry = { id, text: text.trim(), date: dateStr, ts };
    entries.unshift(entry);
    entries.sort((a, b) => b.ts.localeCompare(a.ts));
    saveEntries(entries);
    if (_uid) {
      setSyncBadge('syncing');
      fsEntries().doc(String(id)).set(entry)
        .then(() => setSyncBadge('synced'))
        .catch(() => setSyncBadge('error'));
    }
  }
}

function deleteEntry(id, date) {
  saveEntries(loadEntries().filter(e => e.id !== id));
  // 해당 날짜 사진도 삭제 (같은 날 다른 항목 없으면)
  if (date) {
    const remaining = loadEntries().filter(e => e.date === date);
    if (!remaining.length) deletePhotosLocal(date);
  }
  if (_uid) {
    setSyncBadge('syncing');
    fsEntries().doc(String(id)).delete()
      .then(() => setSyncBadge('synced'))
      .catch(() => setSyncBadge('error'));
  }
}

function updateEntry(id, newText) {
  const entries = loadEntries();
  const entry = entries.find(e => e.id === id);
  if (entry) entry.text = newText.trim();
  saveEntries(entries);
  if (_uid) {
    setSyncBadge('syncing');
    fsEntries().doc(String(id)).update({ text: newText.trim() })
      .then(() => setSyncBadge('synced'))
      .catch(() => setSyncBadge('error'));
  }
}

// Save AI-analysis meta fields (emotion, keywords, summary) to an entry
function saveEntryMeta(id, meta) {
  const entries = loadEntries();
  const entry = entries.find(e => e.id === id);
  if (!entry) return;
  Object.assign(entry, meta);
  saveEntries(entries);
  if (_uid) {
    setSyncBadge('syncing');
    fsEntries().doc(String(id)).update(meta)
      .then(() => setSyncBadge('synced'))
      .catch(() => setSyncBadge('error'));
  }
}

function toDateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function formatDateTime(isoStr) {
  const d = new Date(isoStr);
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

/* ═══════════════════════════════════════════
   LOCATION
═══════════════════════════════════════════ */
let _currentLocation = null; // { label: string, lat, lon }

const PIN_SVG = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>`;

function renderRecLocation(label) {
  const el = document.getElementById('recLocation');
  if (!label) { el.innerHTML = ''; el.className = 'rec-location'; return; }
  el.className = 'rec-location';
  el.innerHTML = `${PIN_SVG} <span class="rec-loc-text">${label}</span><button class="loc-edit-btn" title="위치 수정">✎</button>`;
  el.querySelector('.loc-edit-btn').addEventListener('click', () => {
    const span = el.querySelector('.rec-loc-text');
    const current = span.textContent;
    const inp = document.createElement('input');
    inp.className = 'loc-inline-input';
    inp.value = current;
    span.replaceWith(inp);
    el.querySelector('.loc-edit-btn').style.display = 'none';
    inp.focus(); inp.select();
    const commit = () => {
      const v = inp.value.trim() || current;
      if (_currentLocation) _currentLocation.label = v;
      else _currentLocation = { label: v, lat: null, lon: null };
      renderRecLocation(v);
    };
    inp.addEventListener('blur', commit);
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); commit(); } });
  });
}

async function reverseGeocode(lat, lon) {
  // BigDataCloud 무료 API — 키 불필요
  const url = `https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=ko`;
  const res  = await fetch(url);
  const data = await res.json();
  // 우선순위: locality(동/읍) → city(시) → principalSubdivision(도/시)
  return data.locality || data.city || data.principalSubdivision || data.countryName || '';
}

function requestLocation() {
  const el = document.getElementById('recLocation');
  if (!navigator.geolocation) return;
  el.className = 'rec-location loading';
  el.innerHTML = `${PIN_SVG} 위치 확인 중…`;
  navigator.geolocation.getCurrentPosition(
    async pos => {
      try {
        const { latitude: lat, longitude: lon } = pos.coords;
        const label = await reverseGeocode(lat, lon);
        _currentLocation = { label, lat, lon };
        renderRecLocation(label);
      } catch {
        renderRecLocation(null);
        _currentLocation = null;
      }
    },
    () => { renderRecLocation(null); _currentLocation = null; },
    { timeout: 8000, maximumAge: 300000 }
  );
}

// 녹음 탭 진입 시 위치 자동 취득

function setTranscript(text) {
  transcriptBox.textContent = text;
  transcriptBox.classList.toggle('empty', !text);
}

transcriptBox.addEventListener('input', () => {
  transcriptBox.classList.toggle('empty', !transcriptBox.textContent.trim());
});

function initRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showToast('이 브라우저는 음성인식을 지원하지 않습니다'); return null; }
  const r = new SR();
  r.lang = 'ko-KR';
  r.continuous = true;
  r.interimResults = true;
  r.onresult = e => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) finalText += t + ' ';
      else interim = t;
    }
    setTranscript(finalText + interim);
  };
  r.onend = () => { if (isRecording) { try { r.start(); } catch(e){} } };
  r.onerror = e => { if (e.error === 'not-allowed') showToast('마이크 권한을 허용해 주세요'); };
  return r;
}

micBtn.addEventListener('click', () => {
  if (!isRecording) {
    recognition = initRecognition();
    if (!recognition) return;
    recognition.start();
    isRecording = true;
    micBtn.classList.add('recording');
    micIcon.style.display = 'none';
    stopIcon.style.display = '';
    recStatus.textContent = '녹음 중 — 탭하여 중지';
    recStatus.classList.add('on');
  } else {
    isRecording = false;
    recognition.stop();
    micBtn.classList.remove('recording');
    micIcon.style.display = '';
    stopIcon.style.display = 'none';
    recStatus.textContent = '탭하여 녹음 시작';
    recStatus.classList.remove('on');
  }
});

  finalText = '';
  setTranscript('');
});

/* ═══════════════════════════════════════════
   CALENDAR
═══════════════════════════════════════════ */
let calYear  = now0.getFullYear();
let calMonth = now0.getMonth();
let calWeekStart = _weekStart(now0); // 주간뷰 기준 일요일
let selectedDateStr = null;
let calView = localStorage.getItem('voiceDiary_calView') || 'month';

function _weekStart(date) {
  const d = new Date(date);
  d.setDate(d.getDate() - d.getDay());
  return d;
}

function _fmtDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// 뷰 토글
document.getElementById('calViewMonth').addEventListener('click', () => setCalView('month'));
document.getElementById('calViewWeek').addEventListener('click',  () => setCalView('week'));

function setCalView(v) {
  calView = v;
  localStorage.setItem('voiceDiary_calView', v);
  document.getElementById('calViewMonth').classList.toggle('active', v === 'month');
  document.getElementById('calViewWeek').classList.toggle('active',  v === 'week');
  renderCalendar();
}

// 이전/다음 내비
document.getElementById('prevMonth').addEventListener('click', () => {
  if (calView === 'week') {
    calWeekStart = new Date(calWeekStart.getTime() - 7*86400000);
  } else {
    if (--calMonth < 0) { calMonth = 11; calYear--; }
  }
  selectedDateStr = null; renderCalendar();
});

document.getElementById('nextMonth').addEventListener('click', () => {
  if (calView === 'week') {
    calWeekStart = new Date(calWeekStart.getTime() + 7*86400000);
  } else {
    if (++calMonth > 11) { calMonth = 0; calYear++; }
  }
  selectedDateStr = null; renderCalendar();
});

function renderCalendar() {
  if (calView === 'week') renderWeekView();
  else renderMonthView();
}

/* ── 월간 뷰 ── */
function renderMonthView() {
  const MONTHS_KO = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('calTitle').textContent = `${calYear}년 ${MONTHS_KO[calMonth]}`;

  const entries    = loadEntries();
  const entryDates = new Set(entries.map(e => e.date));
  const todayStr   = toDateStr(now0);
  const firstDay   = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth= new Date(calYear, calMonth+1, 0).getDate();
  const daysInPrev = new Date(calYear, calMonth, 0).getDate();

  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  grid.style.gridTemplateColumns = 'repeat(7, 1fr)';
  grid.className = 'cal-grid';

  ['일','월','화','수','목','금','토'].forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-dow';
    el.textContent = d;
    grid.appendChild(el);
  });

  for (let i = firstDay-1; i >= 0; i--) {
    const el = document.createElement('div');
    el.className = 'cal-cell empty other-month';
    el.innerHTML = `<span>${daysInPrev - i}</span>`;
    grid.appendChild(el);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow = new Date(calYear, calMonth, d).getDay();
    const el  = document.createElement('div');
    let cls   = 'cal-cell';
    if (dow === 0) cls += ' sun';
    if (dow === 6) cls += ' sat';
    if (dateStr === todayStr) cls += ' today';
    if (dateStr === selectedDateStr) cls += ' selected';
    const hasEntry = entryDates.has(dateStr);
    if (hasEntry) cls += ' has-entry';
    const photos = hasEntry ? loadPhotosLocal(dateStr) : [];
    if (photos.length) cls += ' has-photo';
    el.className = cls;
    el.innerHTML = `<span>${d}</span>${hasEntry && !photos.length ? '<div class="dot"></div>' : ''}`;
    if (photos.length) el.style.backgroundImage = `url(${photos[0]})`;
    el.addEventListener('click', () => { selectedDateStr = dateStr; renderMonthView(); renderDayEntries(dateStr); });
    grid.appendChild(el);
  }

  const rem = (7 - ((firstDay + daysInMonth) % 7)) % 7;
  for (let d = 1; d <= rem; d++) {
    const el = document.createElement('div');
    el.className = 'cal-cell empty other-month';
    el.innerHTML = `<span>${d}</span>`;
    grid.appendChild(el);
  }

  if (selectedDateStr) renderDayEntries(selectedDateStr);
}

/* ── 주간 뷰 ── */
function renderWeekView() {
  const DOW_KO = ['일','월','화','수','목','금','토'];
  const entries    = loadEntries();
  const entryDates = new Set(entries.map(e => e.date));
  const todayStr   = toDateStr(now0);

  // 헤더 타이틀
  const endDay = new Date(calWeekStart.getTime() + 6*86400000);
  const sm = calWeekStart.getMonth()+1, em = endDay.getMonth()+1;
  const sy = calWeekStart.getFullYear(), ey = endDay.getFullYear();
  let title = `${sy}년 ${sm}월 ${calWeekStart.getDate()}일`;
  if (sm !== em || sy !== ey) title += ` — ${em}월 ${endDay.getDate()}일`;
  else title += ` — ${endDay.getDate()}일`;
  document.getElementById('calTitle').textContent = title;

  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  grid.className = 'cal-week-grid';

  for (let i = 0; i < 7; i++) {
    const day  = new Date(calWeekStart.getTime() + i*86400000);
    const dateStr = _fmtDate(day);
    const dow  = day.getDay();
    const el   = document.createElement('div');
    let cls    = 'cal-week-cell';
    if (dow === 0) cls += ' sun';
    if (dow === 6) cls += ' sat';
    if (dateStr === todayStr) cls += ' today';
    if (dateStr === selectedDateStr) cls += ' selected';
    const hasEntry = entryDates.has(dateStr);
    const photos = hasEntry ? loadPhotosLocal(dateStr) : [];
    if (photos.length) cls += ' has-photo';
    el.className = cls;

    const dowEl = document.createElement('div');
    dowEl.className = 'cal-week-dow';
    dowEl.textContent = DOW_KO[dow];

    const dateEl = document.createElement('div');
    dateEl.className = 'cal-week-date';
    dateEl.textContent = day.getDate();

    el.appendChild(dowEl);
    el.appendChild(dateEl);
    if (hasEntry && !photos.length) {
      const dot = document.createElement('div');
      dot.className = 'cal-week-dot';
      el.appendChild(dot);
    }
    if (photos.length) el.style.backgroundImage = `url(${photos[0]})`;

    el.addEventListener('click', () => { selectedDateStr = dateStr; renderWeekView(); renderDayEntries(dateStr); });
    grid.appendChild(el);
  }

  if (selectedDateStr) renderDayEntries(selectedDateStr);
}

function renderDayEntries(dateStr) {
  const dayEntriesEl = document.getElementById('dayEntries');
  const listEl       = document.getElementById('dayEntriesList');
  const titleEl      = document.getElementById('dayEntriesTitle');
  const stripEl      = document.getElementById('dayPhotoStrip');
  const entries      = loadEntries().filter(e => e.date === dateStr);
  const [y, m, d]    = dateStr.split('-');
  const dow = new Date(+y, +m-1, +d).getDay();
  titleEl.textContent = `${+m}월 ${+d}일 ${DAYS_KO[dow]}요일 · ${entries.length}개`;
  listEl.innerHTML = '';

  // 날짜 사진 스트립
  stripEl.innerHTML = '';
  loadPhotosLocal(dateStr).forEach((src, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'photo-preview-thumb';
    const img = document.createElement('img');
    img.src = src;
    img.addEventListener('click', () => openLightbox(src));
    const del = document.createElement('button');
    del.className = 'photo-del';
    del.textContent = '✕';
    del.addEventListener('click', () => {
      const photos = loadPhotosLocal(dateStr);
      photos.splice(i, 1);
      savePhotosLocal(dateStr, photos);
      renderDayEntries(dateStr);
      renderCalendar();
    });
    wrap.append(img, del);
    stripEl.appendChild(wrap);
  });

  if (!entries.length) {
    listEl.innerHTML = '<div class="no-entry-msg">이 날의 기록이 없습니다</div>';
  } else {
    // Sort ascending by time so entries appear in chronological order
    const sorted = [...entries].sort((a, b) => a.ts.localeCompare(b.ts));
    let lastPeriod = null;
    const periodIcons = { '아침': '🌅', '오후': '☀️', '저녁': '🌙' };
    sorted.forEach(entry => {
      const period = getPeriod(entry.ts);
      if (period !== lastPeriod) {
        const label = document.createElement('div');
        label.className = 'day-time-label';
        label.textContent = `${periodIcons[period]} ${period}`;
        listEl.appendChild(label);
        lastPeriod = period;
      }
      const card = document.createElement('div');
      card.className = 'day-entry-card';
      const timeEl = document.createElement('div');
      timeEl.className = 'day-entry-time';
      timeEl.textContent = formatDateTime(entry.ts);
      const textEl = document.createElement('div');
      textEl.className = 'day-entry-text';
      textEl.textContent = entry.text;
      const delBtn = document.createElement('button');
      delBtn.className = 'day-entry-del';
      delBtn.dataset.id = entry.id;
      delBtn.textContent = '✕';
      card.append(timeEl, textEl);
      if (entry.location) {
        const loc = document.createElement('div');
        loc.className = 'day-entry-location';
        loc.innerHTML = `${PIN_SVG} ${entry.location}`;
        card.appendChild(loc);
      }
      card.appendChild(delBtn);
      delBtn.addEventListener('click', () => {
        if (confirm('이 항목을 삭제할까요?')) { deleteEntry(entry.id, dateStr); renderDayEntries(dateStr); renderCalendar(); }
      });
      listEl.appendChild(card);
    });
  }
  dayEntriesEl.style.display = 'block';

  // 액션 버튼에 현재 dateStr 바인딩
  _bindDayActions(dateStr);
}

/* ═══════════════════════════════════════════
   LIST
═══════════════════════════════════════════ */
function renderList(filter) {
  const listContent = document.getElementById('listContent');
  const q = (filter || '').trim().toLowerCase();
  let entries = loadEntries();
  if (q) entries = entries.filter(e => e.text.toLowerCase().includes(q));

  if (!entries.length) {
    listContent.innerHTML = `
      <div class="empty-list">
        <div class="icon">◎</div>
        <p>아직 저장된 기록이 없습니다</p>
      </div>`;
    return;
  }

  listContent.innerHTML = '';

  // 날짜별로 그룹핑 (가장 최근 항목 하나씩 대표)
  const byDate = {};
  entries.forEach(e => { (byDate[e.date] = byDate[e.date] || []).push(e); });
  const dates = Object.keys(byDate).sort((a, b) => b.localeCompare(a));

  // 섹션 분류
  const today = toDateStr(now0);
  const yesterday = toDateStr(new Date(now0.getTime() - 86400000));
  const weekAgo = toDateStr(new Date(now0.getTime() - 7 * 86400000));
  const monthStart = `${now0.getFullYear()}-${String(now0.getMonth() + 1).padStart(2,'0')}-01`;

  function getSectionKey(dateStr) {
    if (dateStr === today)     return '오늘';
    if (dateStr === yesterday) return '어제';
    if (dateStr > weekAgo)     return '이번 주';
    const [y, m] = dateStr.split('-');
    const [ty, tm] = today.split('-');
    if (y === ty && m === tm)  return '이번 달';
    return `${+y}년 ${+m}월`;
  }

  let lastSection = null;
  const calSvg = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`;

  dates.forEach(dateStr => {
    const section = getSectionKey(dateStr);
    if (section !== lastSection) {
      const hdr = document.createElement('div');
      hdr.className = 'tl-section-header';
      hdr.innerHTML = `${calSvg} ${section}`;
      listContent.appendChild(hdr);
      lastSection = section;
    }

    const [y, m, d] = dateStr.split('-');
    const dow = new Date(+y, +m - 1, +d).getDay();
    const dateEntries = byDate[dateStr];
    // 날짜별로 하나의 행으로 묶어 표시 (텍스트는 병합)
    const combinedText = dateEntries.map(e => e.text).join(' ');
    const firstEntry   = dateEntries[0];
    const photos       = loadPhotosLocal(dateStr);

    const row = document.createElement('div');
    row.className = 'tl-entry';

    // 왼쪽: 날짜 숫자 + 요일
    const dateCol = document.createElement('div');
    dateCol.className = 'tl-date-col';
    const dayNum = document.createElement('div');
    dayNum.className = 'tl-day-num' + (dow === 0 ? ' sun' : dow === 6 ? ' sat' : '');
    dayNum.textContent = +d;
    const dayDow = document.createElement('div');
    dayDow.className = 'tl-day-dow' + (dow === 0 ? ' sun' : dow === 6 ? ' sat' : '');
    dayDow.textContent = DAYS_KO[dow];
    dateCol.append(dayNum, dayDow);

    // 가운데: 날짜 전체 + 텍스트 + 시간 + 배지 + 액션
    const body = document.createElement('div');
    body.className = 'tl-body';

    const dateLabel = document.createElement('div');
    dateLabel.className = 'tl-date-label';
    dateLabel.textContent = `${+y}년 ${+m}월 ${+d}일 ${DAYS_KO[dow]}요일`;

    // 위치 배지 (저장된 위치가 있으면)
    const entryLoc = dateEntries.find(e => e.location)?.location;
    let locEl = null;
    if (entryLoc) {
      locEl = document.createElement('div');
      locEl.className = 'tl-location';
      locEl.innerHTML = `${PIN_SVG} ${entryLoc}`;
    }

    const textEl = document.createElement('div');
    textEl.className = 'tl-text';
    textEl.textContent = combinedText;

    const timeEl = document.createElement('div');
    timeEl.className = 'tl-time';
    timeEl.innerHTML = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> ${formatDateTime(firstEntry.ts)}`;

    body.appendChild(dateLabel);
    if (locEl) body.appendChild(locEl);
    body.append(textEl, timeEl);

    // 감정/키워드 배지
    const hasMeta = dateEntries.some(e => e.emotion || e.keywords?.length);
    if (hasMeta) {
      const metaRow = document.createElement('div');
      metaRow.className = 'tl-meta-row';
      dateEntries.forEach(e => {
        if (e.emotion) {
          const em = document.createElement('span');
          em.className = 'entry-meta-emotion';
          em.textContent = e.emotion;
          metaRow.appendChild(em);
        }
        (e.keywords || []).forEach(kw => {
          const k = document.createElement('span');
          k.className = 'entry-meta-kw';
          k.textContent = kw;
          metaRow.appendChild(k);
        });
      });
      body.appendChild(metaRow);
    }

    // 수정/삭제/AI 액션
    const actionsEl = document.createElement('div');
    actionsEl.className = 'tl-actions';

    const aiBtn = document.createElement('button');
    aiBtn.className = 'btn-ai';
    aiBtn.style.cssText = 'font-size:11px;padding:5px 10px;';
    aiBtn.innerHTML = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93l-1.41 1.41M4.93 4.93l1.41 1.41"/></svg> AI 분석`;
    aiBtn.addEventListener('click', () => runAiAnalysis(firstEntry.id, combinedText, aiBtn));

    const editBtn = document.createElement('button');
    editBtn.className = 'btn-edit';
    editBtn.textContent = '수정';

    const delBtn = document.createElement('button');
    delBtn.className = 'btn-del';
    delBtn.textContent = '삭제';

    actionsEl.append(aiBtn, editBtn, delBtn);
    body.appendChild(actionsEl);

    // 오른쪽: 사진 썸네일
    let photoEl = null;
    if (photos.length) {
      photoEl = document.createElement('img');
      photoEl.className = 'tl-photo';
      photoEl.src = photos[0];
      photoEl.addEventListener('click', () => openLightbox(photos[0]));
    }

    row.append(dateCol, body);
    if (photoEl) row.appendChild(photoEl);
    listContent.appendChild(row);

    // 더 보기 (텍스트 길면)
    requestAnimationFrame(() => {
      if (textEl.scrollHeight > textEl.clientHeight + 4) {
        textEl.style.cursor = 'pointer';
        textEl.addEventListener('click', () => {
          textEl.classList.toggle('expanded');
        });
      }
    });

    delBtn.addEventListener('click', () => {
      if (!confirm('이 날의 기록을 삭제할까요?')) return;
      dateEntries.forEach(e => deleteEntry(e.id));
      renderList();
    });

    editBtn.addEventListener('click', () => {
      const textarea = document.createElement('textarea');
      textarea.className = 'entry-edit-area';
      textarea.value = combinedText;
      const saveEl = document.createElement('button');
      saveEl.className = 'btn-edit-save';
      saveEl.textContent = '저장';
      const cancelEl = document.createElement('button');
      cancelEl.className = 'btn-edit-cancel';
      cancelEl.textContent = '취소';
      const editActs = document.createElement('div');
      editActs.className = 'tl-actions';
      editActs.append(cancelEl, saveEl);

      textEl.style.display = 'none';
      actionsEl.style.display = 'none';
      body.insertBefore(textarea, timeEl);
      body.appendChild(editActs);
      textarea.focus();

      saveEl.addEventListener('click', () => {
        const newText = textarea.value.trim();
        if (!newText) { showToast('내용을 입력해 주세요'); return; }
        updateEntry(firstEntry.id, newText);
        textEl.textContent = newText;
        textEl.style.display = '';
        actionsEl.style.display = '';
        textarea.remove();
        editActs.remove();
        showToast('수정되었습니다');
      });
      cancelEl.addEventListener('click', () => {
        textEl.style.display = '';
        actionsEl.style.display = '';
        textarea.remove();
        editActs.remove();
      });
    });
  });
}

function getPeriod(isoStr) {
  const h = new Date(isoStr).getHours();
  if (h < 12) return '아침';
  if (h < 18) return '오후';
  return '저녁';
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Ollama API 호출 (스트리밍 지원)
async function callOllama(prompt, onChunk) {
  const model = getAiModel();
  const resp = await fetch('http://localhost:11434/api/generate', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ model, prompt, stream: !!onChunk })
  });
  if (!resp.ok) throw new Error(`Ollama ${resp.status}: 모델 "${model}"을 확인하세요`);

  if (!onChunk) {
    const data = await resp.json();
    return (data.response || '').trim();
  }

  // 스트리밍
  const reader = resp.body.getReader();
  const dec = new TextDecoder();
  let full = '';
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    const lines = dec.decode(value).split('\n').filter(Boolean);
    for (const line of lines) {
      try {
        const j = JSON.parse(line);
        if (j.response) { full += j.response; onChunk(full); }
        if (j.done) return full;
      } catch {}
    }
  }
  return full;
}

// ── 3. 일기 분석 (목록에서 호출) ─────────────
async function runAiAnalysis(entryId, entryText, btn) {
  const origHtml = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = `<span class="ai-spin"></span>`;

  const bodyEl = document.createElement('div');

  const mkSection = (label) => {
    const s = document.createElement('div');
    s.className = 'ai-result-section';
    const uid = 'ai_' + label + '_' + Date.now();
    s.innerHTML = `<div class="ai-result-label">${label}</div><div class="ai-result-value" id="${uid}">...</div>`;
    bodyEl.appendChild(s);
    return s.querySelector('#' + uid);
  };

  const summaryEl  = mkSection('요약');
  const moodEl     = mkSection('감정');
  const keywordsEl = mkSection('키워드');

  const actWrap = document.createElement('div');
  actWrap.style.cssText = 'display:flex;gap:10px;width:100%';
  const saveBtn = document.createElement('button');
  saveBtn.className = 'btn-ai-apply';
  saveBtn.textContent = '일기에 저장';
  saveBtn.style.display = 'none';
  const closeBtn = document.createElement('button');
  closeBtn.className = 'btn-ai-discard';
  closeBtn.textContent = '닫기';
  actWrap.append(closeBtn, saveBtn);
  closeBtn.addEventListener('click', closeAiSheet);

  openAiSheet('일기 분석', bodyEl, actWrap);

  try {
    const prompt = `다음 일기를 분석해주세요. 아래 형식으로 정확히 답해주세요:

요약: [한 문장 요약]
감정: [핵심 감정 1~2개, 예: 행복, 설렘, 불안, 감사, 슬픔 등]
키워드: [핵심 단어 3개를 쉼표로 구분]

일기:
${entryText}`;

    const result = await callOllama(prompt);

    const lines = result.split('\n').filter(Boolean);
    const get = (key) => {
      const line = lines.find(l => l.startsWith(key));
      return line ? line.replace(key, '').trim() : '—';
    };

    const summary  = get('요약:');
    const emotion  = get('감정:');
    const kw       = get('키워드:');
    const keywords = kw !== '—' ? kw.split(/,|，/).map(k => k.trim()).filter(Boolean) : [];

    summaryEl.textContent = summary;
    moodEl.textContent    = emotion;

    if (keywords.length) {
      const tagsEl = document.createElement('div');
      tagsEl.className = 'ai-tags';
      keywords.forEach(k => {
        const tag = document.createElement('span');
        tag.className = 'ai-tag';
        tag.textContent = k;
        tagsEl.appendChild(tag);
      });
      keywordsEl.innerHTML = '';
      keywordsEl.appendChild(tagsEl);
    } else {
      keywordsEl.textContent = kw;
    }

    // 저장 버튼 활성화
    saveBtn.style.display = '';
    saveBtn.addEventListener('click', () => {
      if (entryId) {
        saveEntryMeta(entryId, { emotion, keywords, summary });
        showToast('분석 결과가 저장됐어요');
        closeAiSheet();
        renderList();
      }
    });

  } catch (e) {
    bodyEl.innerHTML = `<div style="color:var(--accent);font-size:14px">${e.message}</div>`;
  } finally {
    btn.disabled = false;
    btn.innerHTML = origHtml;
  }
}

function downloadFile(content, filename, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content], { type: mime }));
  a.download = filename;
  a.click();
}

function exportTxt() {
  const entries = loadEntries();
  if (!entries.length) { showToast('저장된 일기가 없어요'); return; }
  const sorted = [...entries].sort((a, b) => a.ts.localeCompare(b.ts));
  let txt = '■ Voice Diary 내보내기\n' + new Date().toLocaleDateString('ko-KR') + '\n\n';
  let lastDate = '';
  sorted.forEach(e => {
    if (e.date !== lastDate) {
      const [y, m, d] = e.date.split('-');
      txt += `\n═══ ${y}년 ${+m}월 ${+d}일 ═══\n`;
      lastDate = e.date;
    }
    txt += `[${formatDateTime(e.ts)}] ${e.text}\n`;
    if (e.emotion)  txt += `  감정: ${e.emotion}\n`;
    if (e.keywords?.length) txt += `  키워드: ${e.keywords.join(', ')}\n`;
    if (e.summary)  txt += `  요약: ${e.summary}\n`;
    txt += '\n';
  });
  downloadFile(txt, `voice-diary-${toDateStr(new Date())}.txt`, 'text/plain;charset=utf-8');
  showToast('텍스트 파일로 내보냈어요');
}

function exportJson() {
  const entries = loadEntries();
  if (!entries.length) { showToast('저장된 일기가 없어요'); return; }
  downloadFile(JSON.stringify(entries, null, 2), `voice-diary-${toDateStr(new Date())}.json`, 'application/json');
  showToast('JSON으로 내보냈어요');
}

document.getElementById('exportTxtBtn').addEventListener('click', exportTxt);
document.getElementById('exportJsonBtn').addEventListener('click', exportJson);

/* ═══════════════════════════════════════════
   PHOTO — Canvas 압축 저장
═══════════════════════════════════════════ */
const PHOTO_MAX = 800;   // px (long side)
const PHOTO_Q   = 0.72;  // JPEG quality

function compressPhoto(file) {
  return new Promise((resolve) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      const scale = Math.min(1, PHOTO_MAX / Math.max(img.width, img.height));
      const w = Math.round(img.width  * scale);
      const h = Math.round(img.height * scale);
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', PHOTO_Q));
    };
    img.src = url;
  });
}

// 사진은 날짜(dateStr) 기준으로 저장 — 하루에 사진 한 세트
function loadPhotosLocal(dateStr) {
  const raw = localStorage.getItem('voiceDiary_photo_' + dateStr);
  if (!raw) return [];
  try { return JSON.parse(raw); } catch { return [raw]; }
}

function savePhotosLocal(dateStr, arr) {
  localStorage.setItem('voiceDiary_photo_' + dateStr, JSON.stringify(arr));
}

function deletePhotosLocal(dateStr) {
  localStorage.removeItem('voiceDiary_photo_' + dateStr);
}


// 라이트박스
function openLightbox(src) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('open');
}
document.getElementById('lightboxClose').addEventListener('click', () => {
  document.getElementById('lightbox').classList.remove('open');
});
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === e.currentTarget) e.currentTarget.classList.remove('open');
});

// 사진 표시 (날짜 기준)
function renderEntryPhotos(container, dateStr) {
  const photos = loadPhotosLocal(dateStr);
  if (!photos.length) return;
  const row = document.createElement('div');
  row.className = 'entry-photo-row';
  photos.forEach(src => {
    const img = document.createElement('img');
    img.className = 'entry-photo-thumb';
    img.src = src;
    img.addEventListener('click', () => openLightbox(src));
    row.appendChild(img);
  });
  container.appendChild(row);
}

/* ═══════════════════════════════════════════
   SETTINGS TAB
═══════════════════════════════════════════ */
function showSettingsMain() {
  document.getElementById('settingsMain').style.display = '';
  document.querySelectorAll('.settings-inner-page').forEach(p => p.style.display = 'none');
}

function openSettingsPage(pageId) {
  document.getElementById('settingsMain').style.display = 'none';
  document.querySelectorAll('.settings-inner-page').forEach(p => p.style.display = 'none');
  document.getElementById(pageId).style.display = '';
}

function renderSettings() {
  showSettingsMain();
  const user = auth.currentUser;

  // Avatar
  const wrap = document.getElementById('settingsAvatarWrap');
  wrap.innerHTML = '';
  if (user?.photoURL) {
    const img = document.createElement('img');
    img.className = 'settings-avatar-img';
    img.src = user.photoURL;
    img.alt = user.displayName || '';
    wrap.appendChild(img);
  } else {
    const fb = document.createElement('div');
    fb.className = 'settings-avatar-fallback';
    fb.textContent = (user?.displayName || user?.email || '?')[0].toUpperCase();
    wrap.appendChild(fb);
  }

  document.getElementById('settingsUserName').textContent = user?.displayName || user?.email || '로그인 안 됨';
  document.getElementById('settingsUserEmail').textContent = user?.email || '';

  // Last sync time
  const syncEl = document.getElementById('settingsSyncTime');
  syncEl.textContent = _lastSyncTime
    ? `마지막 동기화 ${_lastSyncTime.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' })}`
    : '';

  // Dark toggle state
  document.getElementById('darkToggle').checked = localStorage.getItem('voiceDiary_theme') === 'dark';
}

// Settings navigation
document.getElementById('navDarkMode').addEventListener('click', () => openSettingsPage('settingsPageDark'));
document.getElementById('navBackup').addEventListener('click',   () => openSettingsPage('settingsPageBackup'));
document.getElementById('navAiModel').addEventListener('click',  () => openSettingsPage('settingsPageAi'));
document.getElementById('backFromDark').addEventListener('click',   showSettingsMain);
document.getElementById('backFromBackup').addEventListener('click', showSettingsMain);
document.getElementById('backFromAi').addEventListener('click',     showSettingsMain);

document.getElementById('settingsSignOutBtn').addEventListener('click', handleSignOut);

// JSON import
document.getElementById('importJsonBtn').addEventListener('click', () => {
  document.getElementById('importJsonInput').click();
});
document.getElementById('importJsonInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!Array.isArray(data)) throw new Error('올바른 백업 파일이 아닙니다');
      saveEntries(data);
      refreshActiveTab();
      showToast(`${data.length}개의 일기를 불러왔습니다`);
    } catch (err) {
      showToast('가져오기 실패: ' + err.message);
    }
    e.target.value = '';
  };
  reader.readAsText(file);
});

/* ═══════════════════════════════════════════
   DAY ACTIONS — 사진 / 내보내기 / 구글 캘린더
═══════════════════════════════════════════ */
let _dayActionDate = null;

function _bindDayActions(dateStr) {
  _dayActionDate = dateStr;
  // 다른 날 탭하면 입력 패널 닫기
  document.getElementById('dayWritePanel').style.display = 'none';
  document.getElementById('dayWriteTextarea').value = '';
}

// 수기 입력 토글
const dayWritePanel = document.getElementById('dayWritePanel');
const dayWriteTextarea = document.getElementById('dayWriteTextarea');

document.getElementById('dayWriteBtn').addEventListener('click', () => {
  const isOpen = dayWritePanel.style.display !== 'none';
  dayWritePanel.style.display = isOpen ? 'none' : 'block';
  if (!isOpen) {
    dayWriteTextarea.value = '';
    dayWriteTextarea.focus();
  }
});

document.getElementById('dayWriteCancel').addEventListener('click', () => {
  dayWritePanel.style.display = 'none';
  dayWriteTextarea.value = '';
});

document.getElementById('dayWriteSave').addEventListener('click', () => {
  const text = dayWriteTextarea.value.trim();
  if (!text) { showToast('내용을 입력해주세요'); return; }
  if (!_dayActionDate) return;
  addEntryForDate(text, _dayActionDate);
  dayWriteTextarea.value = '';
  dayWritePanel.style.display = 'none';
  renderDayEntries(_dayActionDate);
  renderCalendar();
  showToast('저장되었습니다');
});

// 사진 추가
document.getElementById('dayPhotoBtn').addEventListener('click', () => {
  if (_dayActionDate) document.getElementById('dayPhotoInput').click();
});

document.getElementById('dayPhotoInput').addEventListener('change', async (e) => {
  if (!_dayActionDate) return;
  const files = Array.from(e.target.files);
  const existing = loadPhotosLocal(_dayActionDate);
  for (const file of files) {
    const base64 = await compressPhoto(file);
    existing.push(base64);
  }
  savePhotosLocal(_dayActionDate, existing);
  e.target.value = '';
  renderDayEntries(_dayActionDate);
  renderCalendar(); // 달력 셀 사진 즉시 반영
});

// 클립보드 복사 (해당 날짜)
document.getElementById('dayExportBtn').addEventListener('click', () => {
  if (!_dayActionDate) return;
  const entries = loadEntries().filter(e => e.date === _dayActionDate);
  if (!entries.length) { showToast('이 날의 기록이 없습니다'); return; }
  const [y, m, d] = _dayActionDate.split('-');
  const dow = new Date(+y, +m-1, +d).getDay();
  // 첫 줄: 날짜, 이후 내용
  let txt = `${+y}년 ${+m}월 ${+d}일 ${DAYS_KO[dow]}요일\n`;
  entries.forEach(e => {
    txt += e.text;
    if (e.emotion)          txt += `\n감정: ${e.emotion}`;
    if (e.keywords?.length) txt += `\n키워드: ${e.keywords.join(', ')}`;
    txt += '\n';
  });
  navigator.clipboard.writeText(txt.trim())
    .then(() => showToast('클립보드에 복사됐어요'))
    .catch(() => showToast('복사 실패 — 브라우저 권한을 확인해주세요'));
});

// 구글 캘린더 추가 (URL 방식 — 추가 인증 불필요)
document.getElementById('dayGcalBtn').addEventListener('click', () => {
  if (!_dayActionDate) return;
  const entries = loadEntries().filter(e => e.date === _dayActionDate);
  if (!entries.length) { showToast('이 날의 기록이 없습니다'); return; }
  const [y, m, d] = _dayActionDate.split('-');
  const mm = String(m).padStart(2, '0');
  const dd = String(d).padStart(2, '0');
  const next = new Date(+y, +m - 1, +d + 1);
  const endDate = `${next.getFullYear()}${String(next.getMonth()+1).padStart(2,'0')}${String(next.getDate()).padStart(2,'0')}`;
  const startDate = `${y}${mm}${dd}`;
  const title = `Voice Diary — ${+y}년 ${+m}월 ${+d}일`;
  const details = entries.map(e => {
    let s = `[${formatDateTime(e.ts)}] ${e.text}`;
    if (e.emotion) s += `\n감정: ${e.emotion}`;
    if (e.summary) s += `\n요약: ${e.summary}`;
    return s;
  }).join('\n\n');
  const url = `https://calendar.google.com/calendar/render?action=TEMPLATE`
    + `&text=${encodeURIComponent(title)}`
    + `&dates=${startDate}/${endDate}`
    + `&details=${encodeURIComponent(details)}`;
  window.open(url, '_blank');
});
