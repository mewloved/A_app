name: Deploy to GitHub Pages

on:
  push:
    branches: [main, claude/voice-diary-app-eyyQ6]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Firebase config
        env:
          FB_API_KEY: ${{ secrets.FB_API_KEY }}
          FB_AUTH_DOMAIN: ${{ secrets.FB_AUTH_DOMAIN }}
          FB_PROJECT_ID: ${{ secrets.FB_PROJECT_ID }}
          FB_STORAGE_BUCKET: ${{ secrets.FB_STORAGE_BUCKET }}
          FB_MESSAGING_SENDER_ID: ${{ secrets.FB_MESSAGING_SENDER_ID }}
          FB_APP_ID: ${{ secrets.FB_APP_ID }}
          FB_MEASUREMENT_ID: ${{ secrets.FB_MEASUREMENT_ID }}
        run: |
          sed -i "s|__FB_API_KEY__|${FB_API_KEY}|g" index.html
          sed -i "s|__FB_AUTH_DOMAIN__|${FB_AUTH_DOMAIN}|g" index.html
          sed -i "s|__FB_PROJECT_ID__|${FB_PROJECT_ID}|g" index.html
          sed -i "s|__FB_STORAGE_BUCKET__|${FB_STORAGE_BUCKET}|g" index.html
          sed -i "s|__FB_MESSAGING_SENDER_ID__|${FB_MESSAGING_SENDER_ID}|g" index.html
          sed -i "s|__FB_APP_ID__|${FB_APP_ID}|g" index.html
          sed -i "s|__FB_MEASUREMENT_ID__|${FB_MEASUREMENT_ID}|g" index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
